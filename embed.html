<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: http://localhost:3000 http://127.0.0.1:3000; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <title>Iarone 3D Embed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body, html { 
      margin:0; padding:0; width:100%; height:100%; 
      overflow:hidden; background-color:transparent; 
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    model-viewer { 
      width:100%; height:100%; background-color:transparent; 
      --poster-color: transparent;
    }
    
    #fallback { 
      display:none; width:100%; height:100%; align-items:center; 
      justify-content:center; background-color:#f8fafc; color:#64748b; 
      flex-direction: column; text-align: center; gap: 8px; padding: 20px;
      box-sizing: border-box;
    }

    #ios-fallback {
      display:none; width:100%; height:100%; align-items:center; 
      justify-content:center; flex-direction:column; gap:12px; 
      background-color:#ffffff; color:#334155; text-align:center; 
      padding:16px; box-sizing:border-box; border: 1px solid #e2e8f0;
      border-radius: 12px;
    }
    .ios-btn {
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 20px; border-radius:8px; background:#0f172a; 
      color:#fff; text-decoration:none; font-size:14px; font-weight:600;
      transition: background 0.2s ease;
    }
    .ios-btn:hover { background: #1e293b; }
  </style>
</head>
<body>
  
  <model-viewer id="viewer" style="display:none;"
    camera-controls 
    auto-rotate 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    ar-scale="fixed"
    shadow-intensity="1">
  </model-viewer>

  <div id="fallback">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <div style="font-weight: 500; color: #475569;">3D Model Yüklenemedi</div>
  </div>
  
  <div id="ios-fallback">
    <div style="font-size:36px; margin-bottom:4px;">📱</div>
    <div style="font-size:14px; max-width:280px; line-height:1.5;">Bu ürün AR deneyimi için USDZ formatında hazırlanmıştır. (Sadece iOS)</div>
    <a id="embed-usdz-btn" href="#" target="_blank" rel="noopener" class="ios-btn">iPhone'da AR Olarak Aç</a>
  </div>

  <script>
    window.IARONE_API_URL = "%VITE_IARONE_API_URL%";
    if (!window.IARONE_API_URL || window.IARONE_API_URL.startsWith("%VITE_")) {
      window.IARONE_API_URL = "http://localhost:3000/api";
    }
  </script>

  <script>
    const API_BASE = (typeof window !== 'undefined' && window.IARONE_API_URL) || 'http://localhost:3000/api';
    
    function publicOrNull(u) { return (typeof u === 'string' && /^https?:\/\//i.test(u.trim())) ? u.trim() : null; }
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');

    if(slug) {
      fetch(API_BASE + '/publish/'+slug)
        .then(res => res.json())
        .then(data => {
          if(data.success && data.package) {
            const pkg = data.package;
            const viewer = document.getElementById('viewer');
            const glbUrl    = publicOrNull(pkg.glbUrl);
            const usdzUrl   = publicOrNull(pkg.usdzUrl);
            const posterUrl = publicOrNull(pkg.posterImageUrl);

            if(usdzUrl) viewer.setAttribute('ios-src', usdzUrl);
            if(posterUrl) viewer.poster = posterUrl;

            if(glbUrl) {
              viewer.addEventListener('error', function(){
                viewer.style.display = 'none';
                document.getElementById('fallback').style.display = 'flex';
              }, { once: true });
              viewer.src = glbUrl;
              viewer.style.display = 'block';
            } else if(usdzUrl) {
              document.getElementById('embed-usdz-btn').href = usdzUrl;
              document.getElementById('ios-fallback').style.display = 'flex';
            } else {
              document.getElementById('fallback').style.display = 'flex';
            }
          } else {
            document.getElementById('fallback').style.display = 'flex';
          }
        })
        .catch(err => {
          document.getElementById('fallback').style.display = 'flex';
        });
    } else {
      document.getElementById('fallback').style.display = 'flex';
    }
  </script>
</body>
</html>
