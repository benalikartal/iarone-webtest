<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iarone Embed</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background-color:transparent; }
    model-viewer { width:100%; height:100%; background-color:transparent; }
    #fallback { display:none; width:100%; height:100%; align-items:center; justify-content:center; background-color:#f1f5f9; color:#475569; font-family:sans-serif; }
  </style>
</head>
<body>
  
  <model-viewer id="viewer" style="display:none;"
    camera-controls 
    auto-rotate 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    ar-scale="fixed">
  </model-viewer>

  <div id="fallback">
    Model Not Found or Unavailable
  </div>
  
  <div id="ios-fallback" style="display:none; width:100%; height:100%; align-items:center; justify-content:center; flex-direction:column; background-color:#111; color:#fff; font-family:sans-serif; text-align:center;">
    <div style="font-size:40px; margin-bottom:8px;">📱</div>
    <div style="font-size:14px; margin-bottom:16px;">iOS AR Ready<br/><span style="color:#888;font-size:11px;">Open on iOS device</span></div>
  </div>

  <!-- Phase 7C.1: inject build-time API base into the runtime global so the
       plain inline script below can read it via window.IARONE_API_URL.
       Vite replaces %VITE_IARONE_API_URL% at build time; the guard keeps
       local dev working when the var is unset (token stays unreplaced). -->
  <script>
    window.IARONE_API_URL = "%VITE_IARONE_API_URL%";
    if (!window.IARONE_API_URL || window.IARONE_API_URL.startsWith("%VITE_")) {
      window.IARONE_API_URL = "http://localhost:3000/api";
    }
  </script>

  <script>
    // Phase 7A: config-driven API base (runtime global → local-dev default).
    // Phase 7C.1: window.IARONE_API_URL is now set by the inject block above
    //   (Vite build-time replacement) so Vercel staging resolves the correct API URL.
    const API_BASE = (typeof window !== 'undefined' && window.IARONE_API_URL) || 'http://localhost:3000/api';
    // Phase 7B.1: only an absolute http(s) URL is renderable — a storage_key or
    // local path must NEVER become a viewer src.
    function publicOrNull(u) { return (typeof u === 'string' && /^https?:\/\//i.test(u.trim())) ? u.trim() : null; }
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');

    if(slug) {
      fetch(API_BASE + '/publish/'+slug)
        .then(res => res.json())
        .then(data => {
          if(data.success && data.package) {
            const pkg = data.package;
            const viewer = document.getElementById('viewer');
            const glbUrl    = publicOrNull(pkg.glbUrl);
            const usdzUrl   = publicOrNull(pkg.usdzUrl);
            const posterUrl = publicOrNull(pkg.posterImageUrl);

            if(pkg.packageType === 'IOS_AR_ONLY') {
              if(!glbUrl && usdzUrl) {
                document.getElementById('ios-fallback').style.display = 'flex';
              } else if(glbUrl) {
                viewer.style.display = 'block';
                viewer.src = glbUrl;
              } else {
                document.getElementById('fallback').innerText = 'Model source not ready';
                document.getElementById('fallback').style.display = 'flex';
              }
            } else {
              if(glbUrl) {
                viewer.src = glbUrl;
                viewer.style.display = 'block';
              } else {
                document.getElementById('fallback').innerText = 'Model source not ready';
                document.getElementById('fallback').style.display = 'flex';
              }
            }
            if(usdzUrl) viewer.setAttribute('ios-src', usdzUrl);
            if(posterUrl) viewer.poster = posterUrl;
          } else {
            document.getElementById('fallback').style.display = 'flex';
          }
        })
        .catch(err => {
          document.getElementById('fallback').style.display = 'flex';
        });
    } else {
      document.getElementById('fallback').style.display = 'flex';
    }
  </script>
</body>
</html>
