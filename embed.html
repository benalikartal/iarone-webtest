<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iarone Embed</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background-color:transparent; }
    model-viewer { width:100%; height:100%; background-color:transparent; }
    #fallback { display:none; width:100%; height:100%; align-items:center; justify-content:center; background-color:#f1f5f9; color:#475569; font-family:sans-serif; }
  </style>
</head>
<body>
  
  <model-viewer id="viewer" style="display:none;"
    camera-controls 
    auto-rotate 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    ar-scale="fixed">
  </model-viewer>

  <div id="fallback">
    Model Not Found or Unavailable
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');

    if(slug) {
      fetch('http://localhost:3000/api/publish/'+slug)
        .then(res => res.json())
        .then(data => {
          if(data.success && data.package) {
            const pkg = data.package;
            const viewer = document.getElementById('viewer');
            
            if(pkg.glbUrl) {
              viewer.src = pkg.glbUrl;
              viewer.style.display = 'block';
            } else {
              document.getElementById('fallback').innerText = 'Model source not ready';
              document.getElementById('fallback').style.display = 'flex';
            }
            if(pkg.usdzUrl) viewer.setAttribute('ios-src', pkg.usdzUrl);
            if(pkg.posterImageUrl) viewer.poster = pkg.posterImageUrl;
          } else {
            document.getElementById('fallback').style.display = 'flex';
          }
        })
        .catch(err => {
          document.getElementById('fallback').style.display = 'flex';
        });
    } else {
      document.getElementById('fallback').style.display = 'flex';
    }
  </script>
</body>
</html>
