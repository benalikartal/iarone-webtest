<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iarone Embed</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background-color:transparent; }
    model-viewer { width:100%; height:100%; background-color:transparent; }
    #fallback { display:none; width:100%; height:100%; align-items:center; justify-content:center; background-color:#f1f5f9; color:#475569; font-family:sans-serif; }
  </style>
</head>
<body>
  
  <model-viewer id="viewer" style="display:none;"
    camera-controls 
    auto-rotate 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    ar-scale="fixed">
  </model-viewer>

  <div id="fallback">
    Model Not Found or Unavailable
  </div>
  
  <!-- Phase 7C.1: compact, iframe-friendly iOS AR fallback for USDZ-only packages
       (USDZ has no web preview by design — never show a broken/empty viewer). -->
  <div id="ios-fallback" style="display:none; width:100%; height:100%; align-items:center; justify-content:center; flex-direction:column; gap:12px; background-color:#111; color:#fff; font-family:sans-serif; text-align:center; padding:16px; box-sizing:border-box;">
    <div style="font-size:36px;">📱</div>
    <div style="font-size:13px; max-width:280px; line-height:1.5; color:#cbd5e1;">USDZ / iOS AR paketi — web önizleme mevcut değil.</div>
    <a id="embed-usdz-btn" href="#" target="_blank" rel="noopener" style="display:inline-block; padding:8px 16px; border-radius:8px; background:#6366f1; color:#fff; text-decoration:none; font-size:13px; font-weight:600;">USDZ indir</a>
  </div>

  <!-- Phase 7C.1: inject build-time API base into the runtime global so the
       plain inline script below can read it via window.IARONE_API_URL.
       Vite replaces %VITE_IARONE_API_URL% at build time; the guard keeps
       local dev working when the var is unset (token stays unreplaced). -->
  <script>
    window.IARONE_API_URL = "%VITE_IARONE_API_URL%";
    if (!window.IARONE_API_URL || window.IARONE_API_URL.startsWith("%VITE_")) {
      window.IARONE_API_URL = "http://localhost:3000/api";
    }
  </script>

  <script>
    // Phase 7A: config-driven API base (runtime global → local-dev default).
    // Phase 7C.1: window.IARONE_API_URL is now set by the inject block above
    //   (Vite build-time replacement) so Vercel staging resolves the correct API URL.
    const API_BASE = (typeof window !== 'undefined' && window.IARONE_API_URL) || 'http://localhost:3000/api';
    // Phase 7B.1: only an absolute http(s) URL is renderable — a storage_key or
    // local path must NEVER become a viewer src.
    function publicOrNull(u) { return (typeof u === 'string' && /^https?:\/\//i.test(u.trim())) ? u.trim() : null; }
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');

    if(slug) {
      fetch(API_BASE + '/publish/'+slug)
        .then(res => res.json())
        .then(data => {
          if(data.success && data.package) {
            const pkg = data.package;
            const viewer = document.getElementById('viewer');
            const glbUrl    = publicOrNull(pkg.glbUrl);
            const usdzUrl   = publicOrNull(pkg.usdzUrl);
            const posterUrl = publicOrNull(pkg.posterImageUrl);

            // USDZ as the iOS Quick Look source whenever present.
            if(usdzUrl) viewer.setAttribute('ios-src', usdzUrl);
            if(posterUrl) viewer.poster = posterUrl;

            if(glbUrl) {
              // Web-renderable GLB → render the viewer; graceful fallback on load fail.
              viewer.addEventListener('error', function(){
                viewer.style.display = 'none';
                const fb = document.getElementById('fallback');
                fb.innerText = 'Model yüklenemedi';
                fb.style.display = 'flex';
              }, { once: true });
              viewer.src = glbUrl;
              viewer.style.display = 'block';
            } else if(usdzUrl) {
              // USDZ-only → compact iOS AR card with a download button. Never show
              // an empty/broken viewer for a package that has no web preview.
              document.getElementById('embed-usdz-btn').href = usdzUrl;
              document.getElementById('ios-fallback').style.display = 'flex';
            } else {
              document.getElementById('fallback').innerText = 'Model source not ready';
              document.getElementById('fallback').style.display = 'flex';
            }
          } else {
            document.getElementById('fallback').style.display = 'flex';
          }
        })
        .catch(err => {
          document.getElementById('fallback').style.display = 'flex';
        });
    } else {
      document.getElementById('fallback').style.display = 'flex';
    }
  </script>
</body>
</html>
