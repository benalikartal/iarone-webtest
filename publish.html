<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iarone Publish Package</title>
  <link rel="stylesheet" href="styles.v5.css" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:var(--bg); margin:0; padding:20px; }
    .publish-card { max-width:600px; width:100%; background:var(--bg-card, #1e1e1e); border-radius:var(--r-xl); padding:24px; border:1px solid var(--border); box-shadow:var(--sh-xl); }
    model-viewer { width:100%; height:400px; background-color:#111; border-radius:12px; margin-bottom:20px; }
    .title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    h1 { margin:0; font-size:24px; color:var(--text); }
  </style>
</head>
<body>

<div class="publish-card" id="publish-container" style="display:none;">
  <div class="title-row">
    <h1 id="pkg-title">Model</h1>
    <span class="badge" style="background:rgba(16, 185, 129, 0.1); color:#10b981;">AR Readiness: <span id="pkg-ar"></span></span>
  </div>

  <!-- Phase 7A (Part C5): honest scale trust chip. Never claims verified unless
       the backend genuinely verified it. -->
  <div id="pkg-scale-chip" style="display:inline-block; font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; margin-bottom:16px; background:rgba(148,163,184,0.12); color:var(--t3);">Ölçek bilinmiyor</div>

  <div id="ios-warning" style="display:none; background:rgba(245,158,11,0.1); color:var(--warn); padding:12px; border-radius:8px; font-size:14px; margin-bottom:16px;">
    ⚠️ iOS-only AR package. Web preview is limited because GLB is missing.
  </div>
  
  <div id="ios-fallback" style="display:none; flex-direction:column; align-items:center; justify-content:center; background:#111; height:400px; border-radius:12px; margin-bottom:20px; padding:20px; text-align:center;">
    <div style="font-size:48px; margin-bottom:16px;">📱</div>
    <h3 style="color:#fff; margin:0 0 8px 0;">iOS AR Ready</h3>
    <p style="color:var(--t3); font-size:14px; margin:0 0 24px 0;">This package does not include a 3D web preview. Open on an iOS device to view in AR.</p>
    <a id="ios-fallback-btn" href="#" target="_blank" class="btn btn-primary">Download USDZ</a>
  </div>

  <model-viewer id="viewer"
    camera-controls 
    auto-rotate 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    ar-scale="fixed">
  </model-viewer>

  <div style="display:flex; gap:16px; margin-top:20px;">
    <button class="btn btn-primary" onclick="document.querySelector('model-viewer').activateAR()" style="flex:1;">
      Open in AR
    </button>
    <a href="market.html#sell" class="btn btn-ghost" style="flex:1; text-align:center;">
      Apply to Market Beta
    </a>
  </div>
  <div style="text-align:center; margin-top:16px; font-size:12px; color:var(--t3);">Powered by Iarone</div>
</div>

<div id="error-container" style="display:none; text-align:center;">
  <h2>Package Not Found or Draft</h2>
</div>

<script>
  // Phase 7A: config-driven API base (runtime global → local-dev default).
  const API_BASE = (typeof window !== 'undefined' && window.IARONE_API_URL) || 'http://localhost:3000/api';

  // Phase 7A (Part C5): honest scale label. The client/web layer can NEVER claim
  // a verified scale; only a backend-verified block (scale_verified + a
  // trustworthy source + a valid bbox) reads as "Doğrulanmış ölçek".
  const _TRUSTWORTHY_SCALE_SOURCES = ['reference_object', 'user_input', 'sensor_depth'];
  function _extractScaleMeta(pkg) {
    if (!pkg || typeof pkg !== 'object') return null;
    return pkg.scaleMetadata || pkg.scale_metadata
        || (pkg.manifest && pkg.manifest.scale_metadata)
        || (pkg.quality && pkg.quality.scale_metadata) || null;
  }
  function _isScaleVerified(sm) {
    if (!sm || typeof sm !== 'object' || sm.scale_verified !== true) return false;
    if (_TRUSTWORTHY_SCALE_SOURCES.indexOf(sm.scale_source) === -1) return false;
    const b = sm.bbox_meters;
    return Array.isArray(b) && b.length === 3 && b.every(n => typeof n === 'number' && isFinite(n) && n > 0);
  }
  function renderScaleChip(pkg) {
    const chip = document.getElementById('pkg-scale-chip');
    if (!chip) return;
    const sm = _extractScaleMeta(pkg);
    if (_isScaleVerified(sm)) {
      chip.innerText = 'Doğrulanmış ölçek';
      chip.style.background = 'rgba(46,158,91,0.12)'; chip.style.color = '#2e9e5b';
    } else if (sm && sm.scale_source && sm.scale_source !== 'unknown') {
      chip.innerText = 'Yaklaşık ölçek (doğrulanmadı)';
      chip.style.background = 'rgba(201,138,27,0.12)'; chip.style.color = '#c98a1b';
    } else {
      chip.innerText = 'Ölçek bilinmiyor';
      chip.style.background = 'rgba(148,163,184,0.12)'; chip.style.color = 'var(--t3)';
    }
  }

  // Phase 7B.1: core invariant — only an absolute http(s) URL is renderable.
  // A storage_key or local path must NEVER become a viewer src / href. The API
  // already guarantees public glbUrl, but the page enforces it defensively.
  function isPublicUrl(u) {
    return typeof u === 'string' && /^https?:\/\//i.test(u.trim());
  }
  function publicOrNull(u) { return isPublicUrl(u) ? u.trim() : null; }

  const urlParams = new URLSearchParams(window.location.search);
  const slug = urlParams.get('slug');

  if(slug) {
    fetch(API_BASE + '/publish/'+slug)
      .then(res => res.json())
      .then(data => {
        if(data.success && data.package) {
          const pkg = data.package;
          // Phase 7B.1: sanitize all renderable URLs up front — non-public values
          // (storage_key / local path) are dropped to null, never rendered.
          const glbUrl    = publicOrNull(pkg.glbUrl);
          const usdzUrl   = publicOrNull(pkg.usdzUrl);
          const posterUrl = publicOrNull(pkg.posterImageUrl);

          // No public artifact at all → show the not-available fallback.
          if(!glbUrl && !usdzUrl) {
            document.getElementById('error-container').style.display = 'block';
            document.querySelector('#error-container h2').innerText =
              'Bu model için yayın bağlantısı henüz hazır değil.';
            return;
          }

          document.getElementById('publish-container').style.display = 'block';
          document.getElementById('pkg-title').innerText = pkg.title || 'Model';
          document.getElementById('pkg-ar').innerText = pkg.arReadinessScore ? pkg.arReadinessScore+'/100' : 'N/A';
          renderScaleChip(pkg);

          const viewer = document.getElementById('viewer');

          if(pkg.packageType === 'IOS_AR_ONLY') {
            document.getElementById('ios-warning').style.display = 'block';
            if(!glbUrl && usdzUrl) {
              viewer.style.display = 'none';
              document.getElementById('ios-fallback').style.display = 'flex';
              document.getElementById('ios-fallback-btn').href = usdzUrl;
            } else {
              if(glbUrl) viewer.src = glbUrl;
              if(usdzUrl) viewer.setAttribute('ios-src', usdzUrl);
            }
          } else {
            if(glbUrl) viewer.src = glbUrl;
            if(usdzUrl) viewer.setAttribute('ios-src', usdzUrl);
          }

          if(posterUrl) viewer.poster = posterUrl;
        } else {
          document.getElementById('error-container').style.display = 'block';
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById('error-container').style.display = 'block';
      });
  } else {
    document.getElementById('error-container').style.display = 'block';
  }
</script>

</body>
</html>
