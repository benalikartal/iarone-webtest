<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iarone Publish Package</title>
  <link rel="stylesheet" href="styles.v5.css" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:var(--bg); margin:0; padding:20px; }
    .publish-card { max-width:600px; width:100%; background:var(--bg-card, #1e1e1e); border-radius:var(--r-xl); padding:24px; border:1px solid var(--border); box-shadow:var(--sh-xl); }
    model-viewer { width:100%; height:400px; background-color:#111; border-radius:12px; margin-bottom:20px; }
    .title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    h1 { margin:0; font-size:24px; color:var(--text); }
  </style>
</head>
<body>

<div class="publish-card" id="publish-container" style="display:none;">
  <div class="title-row">
    <h1 id="pkg-title">Model</h1>
    <span class="badge" style="background:rgba(16, 185, 129, 0.1); color:#10b981;">AR Readiness: <span id="pkg-ar"></span></span>
  </div>
  
  <model-viewer id="viewer"
    camera-controls 
    auto-rotate 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    ar-scale="fixed">
  </model-viewer>

  <div style="display:flex; gap:16px; margin-top:20px;">
    <button class="btn btn-primary" onclick="document.querySelector('model-viewer').activateAR()" style="flex:1;">
      Open in AR
    </button>
    <a href="market.html#sell" class="btn btn-ghost" style="flex:1; text-align:center;">
      Apply to Market Beta
    </a>
  </div>
  <div style="text-align:center; margin-top:16px; font-size:12px; color:var(--t3);">Powered by Iarone</div>
</div>

<div id="error-container" style="display:none; text-align:center;">
  <h2>Package Not Found or Draft</h2>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const slug = urlParams.get('slug');

  if(slug) {
    fetch('http://localhost:3000/api/publish/'+slug)
      .then(res => res.json())
      .then(data => {
        if(data.success && data.package) {
          const pkg = data.package;
          document.getElementById('publish-container').style.display = 'block';
          document.getElementById('pkg-title').innerText = pkg.title || 'Model';
          document.getElementById('pkg-ar').innerText = pkg.arReadinessScore ? pkg.arReadinessScore+'/100' : 'N/A';
          
          const viewer = document.getElementById('viewer');
          if(pkg.glbUrl) viewer.src = pkg.glbUrl;
          if(pkg.usdzUrl) viewer.setAttribute('ios-src', pkg.usdzUrl);
          if(pkg.posterImageUrl) viewer.poster = pkg.posterImageUrl;
        } else {
          document.getElementById('error-container').style.display = 'block';
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById('error-container').style.display = 'block';
      });
  } else {
    document.getElementById('error-container').style.display = 'block';
  }
</script>

</body>
</html>
